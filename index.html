<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFJC</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        .screen {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        
        .screen.active {
            opacity: 1;
            visibility: visible;
        }
        
        .screen-bg {
            background: linear-gradient(135deg, #141E30 0%, #243B55 50%, #0F2027 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            height: 100vh;
            overflow-y: auto;
        }
        
        .page-header {
            width: 100%;
            text-align: center;
            padding: 55px 0;
            z-index: 10;
            flex-shrink: 0;
        }
        
        .header-text {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #5D4037;
            text-shadow: 
                2px 2px 0 rgba(255, 255, 255, 0.7),
                4px 4px 0 rgba(0, 0, 0, 0.2);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .sub-header {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #8B4513;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
        }
        
        .image-container {
            width: 85%;
            max-width: 1000px;
            height: 75vh;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -100px auto 10px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            display: block;
        }
        
        .password-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
        }
        
        .password-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }
        
        .password-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 20px rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        
        .input-container {
            position: relative;
            width: 100%;
        }
        
        .password-input {
            width: 100%;
            padding: 18px 50px 18px 25px;
            font-size: 17px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .password-input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
        }
        
        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }
        
        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            pointer-events: none;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, 
                rgba(33, 150, 243, 0.8) 0%, 
                rgba(21, 101, 192, 0.8) 100%);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            padding: 18px 30px;
            font-size: 17px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, 
                rgba(33, 150, 243, 0.9) 0%, 
                rgba(21, 101, 192, 0.9) 100%);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .main-interface {
            z-index: 800;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .sections-overlay {
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            padding: 10px;
            overflow-y: auto;
        }
        
        .columns-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            align-items: center;
        }
        
        .column {
            flex: 0 1 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: space-evenly;
            min-height: auto;
            width: 100%;
            max-width: 350px;
        }
        
        .section-btn {
            background: rgba(255, 253, 245, 0.85);
            border: none;
            border-radius: 18px;
            padding: 18px 12px;
            font-size: 20px;
            font-weight: 700;
            color: #5D4037;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 253, 245, 0.3);
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
            position: relative;
            touch-action: manipulation;
        }
        
        .section-btn.unlocked {
            background: rgba(76, 175, 80, 0.85);
            color: white;
            text-shadow: none;
        }
        
        .section-btn.unlocked:hover {
            background: rgba(76, 175, 80, 0.95);
        }
        
        .section-btn:active {
            transform: scale(0.96);
        }
        
        .lock-badge {
            display: inline-block;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            white-space: nowrap;
        }
        
        .column:nth-child(1) .section-btn {
            border-right: 4px solid rgba(76, 175, 80, 0.4);
        }
        
        .column:nth-child(2) .section-btn {
            border-right: 4px solid rgba(33, 150, 243, 0.4);
        }
        
        .global-copyright {
            position: fixed;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 9999;
            pointer-events: none;
        }
        
     /* Time Status Message - Centered on Screen */
.time-status {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 40px 30px;
    border-radius: 20px;
    text-align: center;
    max-width: 500px;
    width: 90%;
    border: 3px solid #ff6b6b;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    z-index: 1000;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

.time-status h2 {
    color: #ff6b6b;
    font-size: 2rem;
    margin-bottom: 15px;
}

.time-status p {
    font-size: 18px;
    margin-bottom: 10px;
    line-height: 1.6;
}

.time-status .highlight {
    color: #4ade80;
    font-weight: bold;
}

.time-status .sub {
    font-size: 14px;
    color: #aaa;
    margin-top: 10px;
}
        
       
        
        /* Desktop: side by side */
        @media (min-width: 769px) {
            .columns-container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .column {
                max-width: 450px;
                min-height: 500px;
            }
            .section-btn {
                font-size: 22px;
                padding: 25px 10px;
            }
        }
        
        /* Mobile/Tablet */
        @media (max-width: 768px) {
            .header-text { font-size: 1.8rem; }
            .sub-header { font-size: 0.9rem; }
            .page-header { padding: 15px 0 5px; }
            .image-container { width: 90%; height: 60vh; min-height: 200px; margin: -50px auto 10px; }
            .password-box { padding: 15px 20px; }
            .password-input { font-size: 15px; padding: 14px 45px 14px 18px; }
            .submit-btn { font-size: 16px; padding: 14px 20px; }
            .section-btn { font-size: 18px; padding: 16px 10px; }
            .column { max-width: 320px; }
        }
        
        @media (max-width: 480px) {
            .header-text { font-size: 1.5rem; }
            .image-container { width: 95%; height: 55vh; min-height: 150px; margin: -30px auto 10px; }
            .password-box { padding: 12px 16px; }
            .password-input { font-size: 14px; padding: 12px 40px 12px 16px; }
            .submit-btn { font-size: 15px; padding: 12px 16px; }
            .section-btn { font-size: 16px; padding: 14px 10px; }
            .column { max-width: 280px; }
            .columns-container { padding: 10px; gap: 10px; }
            .column { gap: 10px; }
        }
        
        /* Prevent zoom on focus for iOS */
        input, textarea, button {
            font-size: 16px !important;
        }
        
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <!-- SCREEN 1: Combined (Image + Password) -->
    <div id="combinedScreen" class="combined-screen screen-bg screen active">
        <div class="page-header">
            <div class="header-text"></div>
            <div class="sub-header"></div>
        </div>
        
        <div class="image-container">
            <img src="https://i.ibb.co/MDKxfWzQ/1234.png" 
                 alt="LFJC Image" 
                 class="page-image"
                 onerror="this.style.display='none'">
        </div>
        
        <div class="password-section">
            <div class="password-container">
                <div id="errorMessage" style="color:#ffaa77; font-family:sans-serif; display:none; background:rgba(0,0,0,0.5); padding:10px; border-radius:12px; text-align:center; width:100%;"></div>
                <div class="password-box">
                    <div class="input-container">
                        <input type="password" id="passwordInput" class="password-input" placeholder="Enter access code" autocomplete="off">
                        <span class="input-icon">🔒</span>
                    </div>
                    <button id="submitBtn" class="submit-btn">submit</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- SCREEN 2: Main Interface - Sections -->
    <div id="mainInterface" class="main-interface screen">
        <div class="page-header">
            <div class="header-text">LFJC ONLINE EXAMINATION</div>
            <div class="sub-header"></div>
        </div>
        <div class="sections-overlay">
           <!-- Time Status Message (Outside the container) -->
<div id="timeStatus" class="time-status">
    <h2>ALL THE EXAMS ARE LOCKED</h2>
    <p>Exams are strictly accessible only in the college computer lab.</p>
</div>
<div class="columns-container" id="sectionsContainer">
    <!-- Class buttons will be dynamically inserted here -->
</div>
        </div>
    </div>

    <!-- Global Copyright -->
    <div class="global-copyright">© LFJC 2026 | All Rights Reserved</div>

    <script>
        (function() {
           // ============================================================
// AUTOMATIC SCHEDULE: Classes open 9:00 AM - 4:30 PM Daily
// ============================================================
const CLASS_OPEN_HOUR = 8;       // 9:00 AM
const CLASS_CLOSE_HOUR = 16;     // 4:00 PM (hour part)
const CLASS_CLOSE_MINUTE = 30;   // 30 minutes (for 4:30 PM)

function isExamTime() {
    const now = new Date();
    const currentHour = now.getHours();
    const currentMinute = now.getMinutes();
    
    // Convert current time to total minutes
    const currentTotalMinutes = currentHour * 60 + currentMinute;
    const openTotalMinutes = CLASS_OPEN_HOUR * 60;
    const closeTotalMinutes = CLASS_CLOSE_HOUR * 60 + CLASS_CLOSE_MINUTE;
    
    return currentTotalMinutes >= openTotalMinutes && currentTotalMinutes < closeTotalMinutes;
}

            // ============================================================
            // REPLACE WITH YOUR ACTUAL EXAM URLs FOR EACH CLASS
            // ============================================================
            const SECTION_URLS = {
                "1D": "https://lfjc1d.github.io/1d/",
                "1M": "https://lfjc1m.github.io/1M/",
                "1N": "https://lfjc1n.github.io/1m/",
                "1E": "https://lfjc1e.github.io/1e/",
                "2D": "https://lfjc2d.github.io/2d/",
                "2M": "https://lfjc2m.github.io/2m/",
                "2N": "https://lfjc2n.github.io/2n/",
                "2E": "https://lfjc2e.github.io/2e/"
            };

            const REGULAR_PASSWORD = "lfjc2025";
            // ============================================================

            // DOM Elements
            const combinedScreen = document.getElementById('combinedScreen');
            const mainInterface = document.getElementById('mainInterface');
            const passwordInput = document.getElementById('passwordInput');
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');
            const sectionsContainer = document.getElementById('sectionsContainer');
            const timeStatus = document.getElementById('timeStatus');

            // State
            let currentState = 'combined';
            let isFullscreen = false;

            // Update time display
            document.getElementById('openTimeDisplay').textContent = formatTime(CLASS_OPEN_HOUR);
            document.getElementById('closeTimeDisplay').textContent = formatTime(CLASS_CLOSE_HOUR);

            // Fullscreen function
            function enterFullscreen() {
                try {
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen().catch(() => {});
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen().catch(() => {});
                    } else if (elem.mozRequestFullScreen) {
                        elem.mozRequestFullScreen().catch(() => {});
                    } else if (elem.msRequestFullscreen) {
                        elem.msRequestFullscreen().catch(() => {});
                    }
                } catch (e) {
                    console.log('Fullscreen not supported:', e);
                }
            }

            function focusPassword() {
                setTimeout(() => passwordInput?.focus(), 100);
            }

            function switchScreen(toScreen) {
                combinedScreen.classList.remove('active');
                mainInterface.classList.remove('active');
                toScreen.classList.add('active');
            }

            function shakeBox() {
                const box = document.querySelector('.password-box');
                box?.style.setProperty('animation', 'shake 0.5s');
                setTimeout(() => box?.style.removeProperty('animation'), 500);
            }

            function showError(msg) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = msg;
                setTimeout(() => errorMsg.style.display = 'none', 3500);
            }

            // Render section buttons
            function renderSections() {
                const sections = ['1D', '1M', '1N', '1E', '2D', '2M', '2N', '2E'];
                const column1 = sections.slice(0, 4);
                const column2 = sections.slice(4, 8);

                let html = `
                    <div class="column">
                        ${column1.map(section => `
                            <button class="section-btn unlocked" data-section="${section}">
                                ${section}
                                <span class="lock-badge" style="background: rgba(76,175,80,0.6);">🔓 OPEN</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="column">
                        ${column2.map(section => `
                            <button class="section-btn unlocked" data-section="${section}">
                                ${section}
                                <span class="lock-badge" style="background: rgba(76,175,80,0.6);">🔓 OPEN</span>
                            </button>
                        `).join('')}
                    </div>
                `;

                sectionsContainer.innerHTML = html;

                // Attach click handlers
                document.querySelectorAll('.section-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const section = this.dataset.section;
                        const url = SECTION_URLS[section];
                        if (!url) {
                            alert(`URL for section ${section} not configured`);
                            return;
                        }

                        // Visual feedback
                        this.style.transform = 'scale(0.96)';
                        this.style.opacity = '0.8';

                        // Open exam
                        setTimeout(() => {
                            window.open(url, '_blank');
                        }, 150);

                        setTimeout(() => {
                            this.style.transform = '';
                            this.style.opacity = '';
                        }, 300);
                    });
                });
            }

       // Check time and render sections (or show closed message)
function checkTimeAndRender() {
    const timeStatus = document.getElementById('timeStatus');
    const sectionsContainer = document.getElementById('sectionsContainer');
    
    // First, switch to the main interface screen
    switchScreen(mainInterface);
    currentState = 'sections';
    
    if (isExamTime()) {
        // Time is within schedule - show class buttons, hide message
        timeStatus.style.display = 'none';
        renderSections();
    } else {
        // Time is outside schedule - show message, hide buttons
        timeStatus.style.display = 'block';
        sectionsContainer.innerHTML = ''; // Clear any buttons
    }
}


            // Password check
            function checkPassword() {
                const pwd = passwordInput.value.trim();
                errorMsg.style.display = 'none';

                if (!pwd) {
                    showError('Please enter a password');
                    shakeBox();
                    focusPassword();
                    return;
                }

                if (pwd === REGULAR_PASSWORD) {
                    // Enter fullscreen immediately
                    enterFullscreen();

                    // Check time and render sections (or show closed message)
                    checkTimeAndRender();
                    passwordInput.value = '';
                } else {
                    showError('Incorrect password. Try again.');
                    passwordInput.value = '';
                    shakeBox();
                    focusPassword();
                }
            }

            submitBtn.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') checkPassword();
            });

            // ESC key to go back
            document.addEventListener('keydown', e => {
                if (e.key !== 'Escape') return;
                e.preventDefault();

                if (currentState === 'sections') {
                    switchScreen(combinedScreen);
                    currentState = 'combined';
                    passwordInput.value = '';
                    focusPassword();
                }
            });

            // INIT
            window.addEventListener('load', () => {
                focusPassword();
            });

            // Click anywhere to go fullscreen on first page only
            document.addEventListener('click', () => {
                if (currentState === 'combined') {
                    enterFullscreen();
                }
                if (currentState === 'combined') focusPassword();
            });

            errorMsg.style.display = 'none';
        })();
    </script>
</body>
</html>
